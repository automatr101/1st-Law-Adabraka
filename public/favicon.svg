<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <!-- Scale beam -->
  <line x1="16" y1="7" x2="16" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top bar -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="16" cy="7" r="1.5" fill="#C9A84C"/>
  <!-- Left chain -->
  <line x1="8" y1="10" x2="8" y2="15" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="24" y1="10" x2="24" y2="15" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M5 15 Q8 18 11 15" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Right pan -->
  <path d="M21 15 Q24 18 27 15" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Base -->
  <line x1="13" y1="26" x2="19" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
</svg>
