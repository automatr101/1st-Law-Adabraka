<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Gold radial glow bottom-left -->
  <radialGradient id="glow1" cx="15%" cy="85%" r="55%">
    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Gold radial glow top-right -->
  <radialGradient id="glow2" cx="85%" cy="15%" r="40%">
    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Left gold accent line -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Top gold accent line -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Bottom gold accent line -->
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Scale icon -->
  <g transform="translate(120, 240)">
    <!-- Beam -->
    <line x1="40" y1="0" x2="40" y2="110" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- Top bar -->
    <line x1="0" y1="20" x2="80" y2="20" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- Pivot -->
    <circle cx="40" cy="0" r="5" fill="#C9A84C"/>
    <!-- Left chain -->
    <line x1="0" y1="20" x2="0" y2="55" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <!-- Right chain -->
    <line x1="80" y1="20" x2="80" y2="55" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <!-- Left pan -->
    <path d="-15 55 Q0 72 15 55" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-15,55 Q0,72 15,55" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Right pan -->
    <path d="M65,55 Q80,72 95,55" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Base -->
    <line x1="25" y1="110" x2="55" y2="110" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Firm name -->
  <text x="240" y="295" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#C9A84C" letter-spacing="2">1</text>
  <text x="285" y="272" font-family="Georgia, serif" font-size="36" font-weight="400" fill="#C9A84C">st</text>
  <text x="310" y="295" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#C9A84C" letter-spacing="2"> Law</text>

  <!-- Divider -->
  <rect x="240" y="315" width="60" height="1.5" fill="#C9A84C"/>

  <!-- Location -->
  <text x="240" y="345" font-family="Arial, sans-serif" font-size="18" fill="#888888" letter-spacing="4">ADABRAKA · ACCRA · GHANA</text>

  <!-- Tagline -->
  <text x="240" y="420" font-family="Georgia, serif" font-size="38" font-style="italic" font-weight="300" fill="#F5F0E8" letter-spacing="1">Legal Excellence, Every Step of the Way</text>

  <!-- Practice areas -->
  <text x="240" y="490" font-family="Arial, sans-serif" font-size="14" fill="#888888" letter-spacing="3">CORPORATE · LITIGATION · REAL ESTATE · EMPLOYMENT · FAMILY · CRIMINAL</text>

  <!-- Website -->
  <text x="240" y="530" font-family="Arial, sans-serif" font-size="16" fill="#C9A84C" letter-spacing="2" opacity="0.7">www.1stlaw.org</text>

  <!-- Corner decoration -->
  <rect x="1100" y="540" width="60" height="1" fill="#C9A84C" opacity="0.3"/>
  <rect x="1159" y="480" width="1" height="60" fill="#C9A84C" opacity="0.3"/>
</svg>
